<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Our Memories 💘</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
body{margin:0;background:linear-gradient(#ffeef5,#fff);display:flex;justify-content:center;min-height:100vh;padding:24px 12px;box-sizing:border-box}
.card{font-family:'Quicksand',Arial,sans-serif;background:#ffffffcc;padding:26px;border-radius:20px;max-width:480px;width:100%;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.1);height:fit-content}
h1{color:#ff4f8b;margin-bottom:4px;font-size:26px;font-family:'Pacifico',cursive;font-weight:normal}
.sub{color:#c9558a;font-size:13px;margin-top:0}
a.back{display:inline-block;margin-top:10px;color:#ff6f9f;text-decoration:none;font-size:13px}
a.back:hover{text-decoration:underline}

.monthNav{display:flex;align-items:center;justify-content:space-between;margin-top:18px}
.monthNav button{background:none;border:none;font-size:20px;color:#ff4f8b;cursor:pointer;padding:4px 10px;border-radius:8px}
.monthNav button:hover{background:#fff0f5}
#monthLabel{font-weight:bold;color:#7a2848;font-size:16px}

.weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-top:14px;font-size:11px;color:#c9558a;font-weight:bold}
.daysGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px}
.dayCell{
  aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-radius:10px;font-size:14px;font-family:'Quicksand',Arial,sans-serif;font-weight:700;color:#7a2848;position:relative;overflow:hidden;
  background:#fff;border:1px solid #ffe1ec;transition:background .15s,transform .15s;cursor:default
}
.dayCell.empty{visibility:hidden}
.dayCell.hasMemory{background:#ffe1ec;border-color:#ff9dbe;font-weight:bold;cursor:pointer}
.dayCell.hasMemory:hover{background:#ffd1e0;transform:scale(1.05)}
.dayCell .dot{font-size:10px;margin-top:1px;line-height:1;white-space:nowrap}
.dayCell.today{outline:2px solid #ff4f8b}

#panelOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;align-items:center;justify-content:center;padding:20px;box-sizing:border-box}
#panel{font-family:'Quicksand',Arial,sans-serif;background:#fff;border-radius:18px;padding:22px;max-width:380px;width:100%;box-shadow:0 12px 30px rgba(0,0,0,.2)}
#panelDate{color:#ff4f8b;font-weight:bold;font-size:15px;margin-bottom:10px}
#memoryDisplay{font-size:15px;color:#7a2848;line-height:1.5;white-space:pre-wrap;text-align:left;margin:0}
.panelBtns{display:flex;justify-content:center;margin-top:16px}
.panelBtns button{padding:10px 22px;border:none;border-radius:24px;cursor:pointer;font-size:13px;background:#f4f4f4;color:#555}
</style></head><body>
<div class="card">
<h1>Our Memory Calendar 📅💘</h1>
<p class="sub">Tap a highlighted date to see what happened</p>

<div class="monthNav">
  <button id="prevMonth">←</button>
  <div id="monthLabel"></div>
  <button id="nextMonth">→</button>
</div>

<div class="weekdays">
  <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
</div>
<div class="daysGrid" id="daysGrid"></div>

<a class="back" href="index.html">← Back to the surprise</a>
</div>

<div id="panelOverlay">
  <div id="panel">
    <div id="panelDate"></div>
    <p id="memoryDisplay"></p>
    <div class="panelBtns">
      <button id="closePanel">Close</button>
    </div>
  </div>
</div>

<script>
// -------- Memory data --------
// Add memories here. Each has an emoji (shown right on the calendar tile)
// and a memory text (shown when tapped).
const memories = {
    "2026-03-13": { emoji: "💬✨", text: "My first texts to you" },
    "2026-03-17": { emoji: "💌😳", text: "First time asking you out" },
    "2026-03-30": { emoji: "📍🥰", text: "First day in Canvia" },
    "2026-04-02": { emoji: "💋", text: "First kiss" },
    "2026-04-04": { emoji: "📸", text: "First insta story" },
    "2026-04-05": { emoji: "🥰", text: "First date" },
    "2026-04-11": { emoji: "💑💘", text: "Official" },
    "2026-04-18": { emoji: "🥹💘", text: "First time saying I love you" },
    "2026-04-23": { emoji: "✈️😢", text: "Me leaving for India for a while" }
};

// -------- Calendar state --------
const today = new Date();
let viewYear = 2026;
let viewMonth = 2; // March (0-indexed)

const monthLabel = document.getElementById("monthLabel");
const daysGrid = document.getElementById("daysGrid");
const panelOverlay = document.getElementById("panelOverlay");
const panelDate = document.getElementById("panelDate");
const memoryDisplay = document.getElementById("memoryDisplay");

const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function dateKey(y,m,d){
    return y + "-" + String(m+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
}

function renderCalendar(){
    monthLabel.textContent = monthNames[viewMonth] + " " + viewYear;
    daysGrid.innerHTML = "";

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const totalDays = new Date(viewYear, viewMonth+1, 0).getDate();

    for(let i=0; i<firstDay; i++){
        const empty = document.createElement("div");
        empty.className = "dayCell empty";
        daysGrid.appendChild(empty);
    }

    for(let d=1; d<=totalDays; d++){
        const key = dateKey(viewYear, viewMonth, d);
        const cell = document.createElement("div");
        cell.className = "dayCell";
        if(memories[key]) cell.classList.add("hasMemory");
        if(key === dateKey(today.getFullYear(), today.getMonth(), today.getDate())) cell.classList.add("today");

        const num = document.createElement("div");
        num.textContent = d;
        cell.appendChild(num);
        if(memories[key]){
            const emoji = document.createElement("div");
            emoji.className = "dot";
            emoji.textContent = memories[key].emoji;
            cell.appendChild(emoji);
            cell.onclick = () => openPanel(key);
        }

        daysGrid.appendChild(cell);
    }
}

document.getElementById("prevMonth").onclick = () => {
    viewMonth--;
    if(viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCalendar();
};
document.getElementById("nextMonth").onclick = () => {
    viewMonth++;
    if(viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCalendar();
};

function formatFriendly(key){
    const [y,m,d] = key.split("-").map(Number);
    return monthNames[m-1] + " " + d + ", " + y;
}

function openPanel(key){
    panelDate.textContent = memories[key].emoji + "  " + formatFriendly(key);
    memoryDisplay.textContent = memories[key].text;
    panelOverlay.style.display = "flex";
}
function closePanel(){
    panelOverlay.style.display = "none";
}
document.getElementById("closePanel").onclick = closePanel;
panelOverlay.addEventListener("click", (e) => { if(e.target === panelOverlay) closePanel(); });

renderCalendar();
</script>
</body></html>
